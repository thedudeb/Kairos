apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recruitment-worker
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        # Worker doesn't serve HTTP — keep one instance warm to drain the queue
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/cloudsql-instances: project-c2ab06fc-de81-45b1-8bd:us-central1:recruitment
    spec:
      serviceAccountName: recruitment-api@project-c2ab06fc-de81-45b1-8bd.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/project-c2ab06fc-de81-45b1-8bd/recruitment/backend:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              arq app.worker.WorkerSettings &
              python3 -c "
              import http.server, os, threading
              class H(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'ok')
                  def log_message(self, *a): pass
              http.server.HTTPServer(('', int(os.environ.get('PORT', 8080))), H).serve_forever()
              "
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-redis-url
                  key: latest
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: recruitment-auth-secret
                  key: latest
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-internal-api-key
                  key: latest
            - name: INITIAL_ADMIN_EMAIL
              value: "bkukner@gmail.com"
            - name: GCS_BUCKET
              value: "recruitment-resumes-project-c2ab06fc-de81-45b1-8bd"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-gemini-api-key
                  key: latest
            - name: ENVIRONMENT
              value: "production"

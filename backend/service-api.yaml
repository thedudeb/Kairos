apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recruitment-api
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "true"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: recruitment-api@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/recruitment/backend:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-redis-url
                  key: latest
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: recruitment-auth-secret
                  key: latest
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-internal-api-key
                  key: latest
            - name: INITIAL_ADMIN_EMAIL
              value: "YOUR_ADMIN_EMAIL@example.com"
            - name: GCS_BUCKET
              value: "recruitment-resumes-PROJECT_ID"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-resend-api-key
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-gemini-api-key
                  key: latest
            - name: FRONTEND_ORIGIN
              value: "https://YOUR_VERCEL_URL.vercel.app"
            - name: ENVIRONMENT
              value: "production"
